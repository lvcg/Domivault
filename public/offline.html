<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DomiVault Offline</title>
    <meta name="theme-color" content="#0f172a" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.36);
        padding: 32px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.65;
      }

      a {
        color: #a7f3d0;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DomiVault is offline</h1>
      <p>
        Your connection dropped before this page could load. Reconnect and try again to continue managing your
        home records, maintenance reminders, and documents.
      </p>
      <p><a href="/">Return to DomiVault</a></p>
    </main>
  </body>
</html>
